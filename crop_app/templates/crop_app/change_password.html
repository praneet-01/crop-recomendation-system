{% extends 'crop_app/base.html' %}
{% block title %}Change Password — CropSense{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="auth-card">
          <div class="auth-header text-center">
            <div class="auth-icon">🔐</div>
            <h2>Change Password</h2>
          </div>
          <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <input type="password" name="old_password" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" name="new_password1" class="form-control" required minlength="8" />
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm New Password</label>
              <input type="password" name="new_password2" class="form-control" required />
            </div>
            <button type="submit" class="btn cs-btn-primary w-100">Update Password</button>
          </form>
          <div class="text-center mt-3">
            <a href="{% url 'profile' %}">← Back to Profile</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
